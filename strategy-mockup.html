<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>공격 전략 — 시안 v4</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
<style>
:root {
  --bg: #f0f4fd;
  --bg-gradient: radial-gradient(ellipse at top, #dde8ff 0%, #f0f4fd 65%);
  --surface: #ffffff;
  --border: rgba(15,23,42,.10);
  --border-strong: rgba(15,23,42,.18);
  --text: #0f172a;
  --text-dim: #64748b;
  --text-faint: rgba(15,23,42,.38);
  --accent: #7c3aed;
  --accent-soft: #8b5cf6;
  --accent-dim: rgba(124,58,237,.12);
  --card-bg: linear-gradient(160deg,#c7dcff 0%,#cbc8f8 55%,#d8d0f8 100%);
  --card-border: rgba(130,120,240,.25);
  --card-shadow: 0 6px 28px rgba(100,80,220,.14);
  --member-bg: rgba(255,255,255,.52);
  --member-bg-hover: rgba(255,255,255,.72);
  --member-border: rgba(255,255,255,.50);
  --header-h: 52px;
  --font: "Pretendard Variable",Pretendard,-apple-system,BlinkMacSystemFont,sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:15px;line-height:1.6;color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased}
body{background:var(--bg);background-image:var(--bg-gradient);background-attachment:fixed;min-height:100vh}

/* ── 헤더 ── */
.app-header{position:sticky;top:0;z-index:50;height:var(--header-h);background:rgba(255,255,255,.88);backdrop-filter:blur(12px);border-bottom:1px solid var(--border)}
.app-header-inner{max-width:1200px;height:100%;margin:0 auto;padding:0 20px;display:flex;align-items:center;gap:16px}
.app-brand{display:inline-flex;align-items:center;gap:8px;font-size:14px;font-weight:800;color:var(--text);text-decoration:none;flex-shrink:0}
.app-brand svg{color:var(--accent)}
.app-nav{display:flex;gap:2px}
.app-nav-tab{display:inline-flex;align-items:center;padding:6px 12px;border-radius:6px;font-size:13px;font-weight:600;color:var(--text-dim);text-decoration:none;transition:background .15s,color .15s}
.app-nav-tab:hover{background:rgba(15,23,42,.05);color:var(--text);text-decoration:none}
.app-nav-tab.is-active{color:var(--accent);background:var(--accent-dim)}

/* ── 히어로 ── */
.hero{max-width:1200px;margin:32px auto 0;padding:0 20px;text-align:center}
.hero-eyebrow{font-size:11.5px;font-weight:700;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
.hero-title{font-size:28px;font-weight:800;letter-spacing:-.02em;margin-bottom:8px}
.hero-desc{font-size:14px;color:var(--text-dim)}

/* ── 페이지 레이아웃 ── */
.page-layout{
  max-width:1440px;margin:24px auto 60px;padding:0 20px;
  display:grid;grid-template-columns:1fr 320px;gap:20px;align-items:start;
}
.page-left{display:flex;flex-direction:column;gap:16px;min-width:0}
.page-right{
  position:sticky;top:calc(var(--header-h) + 12px);
  display:flex;flex-direction:column;
}

/* ── 시나리오 패널 (탭 + 설명 통합) ── */
.scenario-panel-inner{
  background:rgba(255,255,255,.60);
  border:1px solid var(--border);border-radius:16px;
  backdrop-filter:blur(8px);
  overflow:hidden;
}
.scenario-tabs{
  display:flex;gap:0;
  padding:4px 6px 0;
}
.s-tab{
  padding:9px 20px 10px;
  border:none;background:transparent;cursor:pointer;
  font:inherit;font-size:14px;font-weight:700;
  color:var(--text-dim);
  transition:color .15s;
  white-space:nowrap;position:relative;
}
.s-tab:hover{color:var(--text)}
.s-tab.is-active{color:var(--accent)}
.s-tab.is-active::after{
  content:'';
  position:absolute;bottom:0;left:10px;right:10px;
  height:2px;border-radius:2px 2px 0 0;
  background:var(--accent);
}
.scenario-desc{
  padding:11px 18px 13px;
  border-top:1px solid var(--border);
  min-height:40px;
}
.scenario-desc-text{font-size:13px;color:var(--text-dim);font-weight:500;line-height:1.5}

/* 색상 클래스 (카드 배지용으로만 유지) */
.d1{background:#7c3aed}
.d2{background:#2563eb}
.d3{background:#059669}
.d-solo{background:#d97706}

/* ── 채팅 패널 ── */
.chat-panel{
  background:rgba(255,255,255,.70);border:1px solid var(--border);
  border-radius:16px;backdrop-filter:blur(10px);
  display:flex;flex-direction:column;
  height:calc(100vh - var(--header-h) - 36px);
  max-height:760px;overflow:hidden;
}
.chat-header{
  padding:14px 16px 12px;
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.chat-header-title{font-size:14px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.chat-header-meta{font-size:11px;color:var(--text-faint);font-weight:600}
.chat-messages{
  flex:1;overflow-y:auto;
  padding:12px 14px;
  display:flex;flex-direction:column;gap:10px;
  scroll-behavior:smooth;
}
.chat-messages::-webkit-scrollbar{width:4px}
.chat-messages::-webkit-scrollbar-thumb{background:rgba(100,80,220,.20);border-radius:4px}

/* 메시지 행 */
.chat-msg{display:flex;gap:9px;align-items:flex-start}
.chat-msg.is-mine{flex-direction:row-reverse}
.chat-msg-avatar{
  width:32px;height:32px;border-radius:8px;flex-shrink:0;
  background:linear-gradient(135deg,#a5b4fc,#818cf8);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:white;
  overflow:hidden;
}
.chat-msg-avatar img{width:100%;height:100%;object-fit:cover}
.chat-msg-body{max-width:78%;display:flex;flex-direction:column;gap:3px}
.chat-msg.is-mine .chat-msg-body{align-items:flex-end}
.chat-msg-meta{
  display:flex;align-items:baseline;gap:5px;
  font-size:11px;color:var(--text-faint);font-weight:600;
}
.chat-msg.is-mine .chat-msg-meta{flex-direction:row-reverse}
.chat-msg-nick{color:var(--text-dim);font-weight:700}
.chat-msg-bubble{
  display:inline-block;
  padding:7px 11px;border-radius:12px;
  font-size:13px;line-height:1.5;color:var(--text);
  background:rgba(255,255,255,.80);border:1px solid var(--border);
  word-break:break-all;
  border-radius:4px 12px 12px 12px;
}
.chat-msg.is-mine .chat-msg-bubble{
  background:var(--accent);color:white;border-color:transparent;
  border-radius:12px 4px 12px 12px;
}

/* 날짜 구분선 */
.chat-date-divider{
  display:flex;align-items:center;gap:8px;
  font-size:11px;color:var(--text-faint);font-weight:700;
  padding:4px 0;
}
.chat-date-divider::before,.chat-date-divider::after{
  content:'';flex:1;height:1px;background:var(--border);
}

/* 입력 영역 */
.chat-input-area{
  padding:10px 12px;border-top:1px solid var(--border);
  flex-shrink:0;display:flex;flex-direction:column;gap:8px;
}
.chat-input-row{display:flex;gap:8px;align-items:flex-end}
.chat-input{
  flex:1;min-height:38px;max-height:90px;
  padding:8px 12px;resize:none;
  border:1.5px solid var(--border-strong);border-radius:10px;
  font:inherit;font-size:13px;line-height:1.5;color:var(--text);
  background:var(--surface);outline:none;
  transition:border-color .15s;
}
.chat-input:focus{border-color:var(--accent)}
.chat-input::placeholder{color:var(--text-faint)}
.chat-input:disabled{opacity:.5;cursor:not-allowed}
.chat-send-btn{
  height:38px;padding:0 14px;white-space:nowrap;
  background:var(--accent);color:white;
  border:none;border-radius:10px;
  font:inherit;font-size:13px;font-weight:700;
  cursor:pointer;transition:background .15s;flex-shrink:0;
}
.chat-send-btn:hover:not(:disabled){background:var(--accent-soft)}
.chat-send-btn:disabled{opacity:.45;cursor:not-allowed}
.chat-cooldown{
  font-size:11px;font-weight:700;color:var(--accent);
  text-align:right;min-height:14px;
}
/* 미로그인 안내 */
.chat-login-notice{
  padding:14px;text-align:center;
  font-size:12.5px;color:var(--text-dim);font-weight:600;
  border-top:1px solid var(--border);flex-shrink:0;
}
.chat-login-notice a{color:var(--accent);cursor:pointer;text-decoration:underline}

/* ── 포지션 흐름 그리드 ── */
.flow-grid{display:grid;align-items:start;gap:0}
.flow-grid.cols-1{max-width:400px;margin:0 auto}

/* 화살표 커넥터 */
.flow-arrow-col{
  display:flex;align-items:flex-start;justify-content:center;
  padding-top:52px;
  color:rgba(100,80,220,.45);
}

/* ── 컬럼 ── */
.st-col{display:flex;flex-direction:column}

/* 순서 번호 — 카드 hero 안 좌상단 */
.st-card-num{
  position:absolute;top:12px;left:12px;
  width:22px;height:22px;border-radius:50%;
  font-size:11px;font-weight:900;color:white;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 2px 6px rgba(0,0,0,.20);
}
.badge-1{background:linear-gradient(135deg,#7c3aed,#6d28d9)}
.badge-2{background:linear-gradient(135deg,#2563eb,#1d4ed8)}
.badge-3{background:linear-gradient(135deg,#059669,#047857)}

/* ── 카드 ── */
.st-card{
  background:var(--card-bg);border:1.5px solid var(--card-border);
  border-radius:20px;box-shadow:var(--card-shadow);
  overflow:hidden;display:flex;flex-direction:column;
}

/* 집결장 섹션 */
.st-card-hero{
  padding:24px 20px 18px;
  display:flex;flex-direction:column;align-items:center;gap:8px;position:relative;
}
.st-card-hero::after{
  content:'';position:absolute;bottom:0;left:16px;right:16px;
  height:1px;background:rgba(255,255,255,.45);
}
.st-rep-avatar{
  width:72px;height:72px;border-radius:14px;overflow:hidden;
  background:linear-gradient(135deg,#a5b4fc,#818cf8);
  border:3px solid rgba(255,255,255,.70);box-shadow:0 4px 16px rgba(80,70,200,.25);
  display:flex;align-items:center;justify-content:center;
  font-size:28px;font-weight:800;color:white;flex-shrink:0;
}
.st-rep-avatar img{width:100%;height:100%;object-fit:cover;display:block}

/* 집결장 등록 버튼 */
.st-rep-add{
  width:72px;height:72px;border-radius:14px;
  border:2px dashed rgba(100,80,220,.32);background:rgba(255,255,255,.25);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;
  cursor:pointer;transition:background .18s,border-color .18s,transform .15s;
  color:rgba(80,60,200,.40);
}
.st-rep-add:hover{background:rgba(255,255,255,.55);border-color:rgba(100,80,220,.58);color:rgba(80,60,200,.72);transform:scale(1.04)}

.st-rep-name{font-size:16px;font-weight:800;color:#1e1b4b;letter-spacing:-.01em;text-align:center}
.st-rep-hint{font-size:11px;color:rgba(80,60,200,.50);font-weight:600}
.st-rep-tc{
  font-size:11px;font-weight:700;color:#4338ca;
  background:rgba(99,102,241,.14);border:1px solid rgba(99,102,241,.28);
  padding:2px 10px;border-radius:999px;
}
/* 집결장 라벨 - 카드 안에서만 표시, 컬럼 헤더와 구분 */
.st-rep-label{
  font-size:10.5px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;
  color:rgba(67,56,202,.50);margin-bottom:2px;
}

/* 멤버 리스트 */
.st-card-body{padding:12px 12px 14px;display:flex;flex-direction:column;gap:7px}

.st-member{
  display:flex;align-items:center;gap:9px;
  padding:7px 9px;border-radius:9px;
  background:var(--member-bg);border:1px solid var(--member-border);
  backdrop-filter:blur(4px);transition:background .15s;
}
.st-member:hover{background:var(--member-bg-hover)}
.st-member-avatar{
  width:34px;height:34px;border-radius:8px;overflow:hidden;
  background:linear-gradient(135deg,#c7d2fe,#a5b4fc);
  border:2px solid rgba(255,255,255,.55);
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:800;color:#4338ca;flex-shrink:0;
}
.st-member-info{flex:1;min-width:0;display:flex;align-items:center;justify-content:space-between;gap:6px}
.st-member-name{font-size:13px;font-weight:700;color:#1e1b4b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.st-member-tc{font-size:11px;font-weight:700;color:#4338ca;white-space:nowrap;flex-shrink:0}

/* 집결원 등록 버튼 */
.st-member-add{
  display:flex;align-items:center;gap:7px;
  padding:7px 10px;border-radius:9px;
  background:rgba(255,255,255,.25);border:1.5px dashed rgba(100,80,220,.28);
  cursor:pointer;width:100%;
  font:inherit;font-size:12.5px;font-weight:700;
  color:rgba(67,56,202,.55);transition:background .15s,border-color .15s,color .15s;
}
.st-member-add:hover{background:rgba(255,255,255,.50);border-color:rgba(100,80,220,.52);color:rgba(67,56,202,.88)}
.st-member-add-icon{
  width:22px;height:22px;border-radius:5px;
  background:rgba(99,102,241,.12);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}

/* ── 다이얼로그 ── */
.dlg-backdrop{
  position:fixed;inset:0;z-index:200;
  background:rgba(15,23,42,.45);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;padding:20px;
}
.dlg-backdrop[hidden]{display:none}
.dlg-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:20px;box-shadow:0 24px 60px rgba(15,23,42,.22);
  width:100%;max-width:380px;padding:26px 22px 22px;
  display:flex;flex-direction:column;gap:14px;
}
.dlg-header{display:flex;align-items:center;justify-content:space-between}
.dlg-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.01em}
.dlg-close{
  width:30px;height:30px;border-radius:8px;border:none;
  background:rgba(15,23,42,.06);display:flex;align-items:center;justify-content:center;
  cursor:pointer;color:var(--text-dim);transition:background .12s;
}
.dlg-close:hover{background:rgba(15,23,42,.12)}
.dlg-input-row{display:flex;gap:8px}
.dlg-input{
  flex:1;height:40px;padding:0 12px;
  border:1.5px solid var(--border-strong);border-radius:9px;
  font:inherit;font-size:14px;color:var(--text);background:var(--surface);
  outline:none;transition:border-color .15s;
}
.dlg-input:focus{border-color:var(--accent)}
.dlg-input::placeholder{color:var(--text-faint)}
.dlg-search-btn{
  height:40px;padding:0 14px;background:var(--accent);color:white;
  border:none;border-radius:9px;font:inherit;font-size:13px;font-weight:700;
  cursor:pointer;white-space:nowrap;transition:background .15s;
}
.dlg-search-btn:hover{background:var(--accent-soft)}
.dlg-preview{
  display:flex;align-items:center;gap:12px;
  padding:11px 13px;border-radius:12px;
  background:rgba(99,102,241,.06);border:1px solid rgba(99,102,241,.18);
}
.dlg-preview[hidden]{display:none}
.dlg-preview-avatar{
  width:42px;height:42px;border-radius:9px;
  background:linear-gradient(135deg,#a5b4fc,#818cf8);
  display:flex;align-items:center;justify-content:center;
  font-size:17px;font-weight:800;color:white;flex-shrink:0;overflow:hidden;
}
.dlg-preview-name{font-size:14px;font-weight:800;color:var(--text)}
.dlg-preview-meta{font-size:12px;color:var(--text-dim)}
.dlg-confirm-btn{
  height:42px;width:100%;background:var(--accent);color:white;
  border:none;border-radius:11px;font:inherit;font-size:14px;font-weight:700;
  cursor:pointer;transition:background .15s;
}
.dlg-confirm-btn:hover{background:var(--accent-soft)}
.dlg-confirm-btn[hidden]{display:none}


/* ── 반응형 ── */
@media(max-width:1024px){
  .page-layout{grid-template-columns:1fr;gap:16px}
  .page-right{position:static}
  .chat-panel{height:420px;max-height:420px}
}
@media(max-width:760px){
  .flow-arrow-col{padding-top:0;padding:6px 0;padding-left:24px;align-items:center}
  .flow-arrow-col svg{transform:rotate(90deg)}
}
@media(max-width:480px){.app-nav{display:none}}
</style>
</head>
<body>

<!-- 헤더 -->
<header class="app-header">
  <div class="app-header-inner">
    <a class="app-brand" href="/">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/>
      </svg>
      <strong>1767 서버</strong>
    </a>
    <nav class="app-nav">
      <a href="/" class="app-nav-tab">홈</a>
      <a href="/survey/" class="app-nav-tab">KvK 설문</a>
      <a href="/castle-battle/" class="app-nav-tab">캐슬 전투</a>
      <a href="/strategy/" class="app-nav-tab is-active">전략</a>
    </nav>
  </div>
</header>

<!-- 히어로 -->
<section class="hero">
  <p class="hero-eyebrow">대외비</p>
  <h1 class="hero-title">캐슬 전투 전략</h1>
  <p class="hero-desc">상황별 집결장/집결원을 확인하세요.</p>
</section>

<!-- 페이지 레이아웃: 전략(70%) + 채팅(30%) -->
<div class="page-layout">

  <!-- ── 좌측: 전략 영역 ── -->
  <div class="page-left">

    <!-- 시나리오 패널 (탭 + 설명 통합) -->
    <div class="scenario-panel-inner">
      <div class="scenario-tabs" id="scenario-tabs"></div>
      <div class="scenario-desc">
        <span class="scenario-desc-text" id="sdesc-text"></span>
      </div>
    </div>

    <!-- 포지션 그리드 -->
    <div class="flow-grid" id="flow-grid"></div>

  </div>

  <!-- ── 우측: 채팅 패널 ── -->
  <div class="page-right">
    <div class="chat-panel">
      <div class="chat-header">
        <span class="chat-header-title">채팅</span>
        <span class="chat-header-meta" id="chat-online-count">접속자 —</span>
      </div>

      <!-- 메시지 목록 -->
      <div class="chat-messages" id="chat-messages"></div>

      <!-- 입력 영역 (로그인 상태에 따라 교체) -->
      <div id="chat-input-area"></div>
    </div>
  </div>

</div>

<!-- 다이얼로그 -->
<div class="dlg-backdrop" id="dlg-backdrop" hidden>
  <div class="dlg-card" role="dialog" aria-modal="true">
    <div class="dlg-header">
      <h2 class="dlg-title" id="dlg-title">집결장 등록</h2>
      <button class="dlg-close" onclick="closeDlg()">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    </div>
    <div class="dlg-input-row">
      <input class="dlg-input" id="dlg-id-input" type="text" placeholder="킹샷 ID (숫자 4~15자리)"
        inputmode="numeric" maxlength="15"
        oninput="onDlgInput()" onkeydown="if(event.key==='Enter') doSearch()" />
      <button class="dlg-search-btn" onclick="doSearch()">검색</button>
    </div>
    <div class="dlg-preview" id="dlg-preview" hidden>
      <div class="dlg-preview-avatar" id="dlg-prev-avatar">?</div>
      <div>
        <div class="dlg-preview-name" id="dlg-prev-name">-</div>
        <div class="dlg-preview-meta" id="dlg-prev-meta">-</div>
      </div>
    </div>
    <button class="dlg-confirm-btn" id="dlg-confirm-btn" hidden onclick="doConfirm()">
      이 플레이어로 등록
    </button>
  </div>
</div>

<script>
/* ──────────────────────────────────────
   슬롯 데이터 (집결장 닉네임이 컬럼 제목이 됨)
   실제 서비스에서는 DB에서 불러오는 구조
────────────────────────────────────── */
const SLOTS = {
  'a': {
    badgeClass: 'badge-1', dotClass: 'd1',
    leader: { nickname: '폭풍전사', city_level: 28, avatar_url: null },
    members: [
      { nickname: '번개기사',   city_level: 27 },
      { nickname: '심연의검객', city_level: 27 },
      { nickname: '붉은매',    city_level: 26 },
    ],
  },
  'b': {
    badgeClass: 'badge-2', dotClass: 'd2',
    leader: { nickname: '블루드래곤', city_level: 27, avatar_url: null },
    members: [
      { nickname: '빙하전사', city_level: 27 },
      { nickname: '서리기사', city_level: 26 },
    ],
  },
  'c': {
    badgeClass: 'badge-3', dotClass: 'd3',
    leader: null,   // ← 미배정 상태 시연
    members: [],
  },
};

/* 시나리오 정의 — 슬롯 참조 + 역할 레이블 */
const SCENARIOS = [
  {
    key: 'attack-order',
    label: '공격',
    desc: '순서대로 공격을 진행합니다. 앞 단계가 끝나면 다음 집결장이 진입합니다.',
    steps: [
      { slotKey: 'a', role: '1차 공격' },
      { slotKey: 'b', role: '2차 공격' },
      { slotKey: 'c', role: '3차 공격' },
    ],
    arrows: true,
  },
  {
    key: 'defense',
    label: '수비',
    desc: '해당 집결장 팀이 전담 수비를 맡습니다.',
    steps: [
      { slotKey: 'c', role: '수비 담당' },
    ],
    arrows: false,
  },
  {
    key: 'counter',
    label: '카운터',
    desc: '첫 번째 집결장이 진입하고 두 번째가 뒤를 받칩니다.',
    steps: [
      { slotKey: 'a', role: '1차 카운터' },
      { slotKey: 'b', role: '2차 카운터' },
    ],
    arrows: true,
  },
];

let activeKey = 'attack-order';
let dlgMode = 'leader', dlgSlotKey = '', dlgRole = '';

/* ── 슬롯 집결장 닉네임 반환 (없으면 null) ── */
function leaderName(slotKey) {
  return SLOTS[slotKey]?.leader?.nickname ?? null;
}

/* ── 탭 렌더링 ── */
function renderTabs() {
  const el = document.getElementById('scenario-tabs');
  el.innerHTML = '';
  SCENARIOS.forEach(sc => {
    const btn = document.createElement('button');
    btn.className = 's-tab' + (sc.key === activeKey ? ' is-active' : '');
    btn.textContent = sc.label;
    btn.onclick = () => { activeKey = sc.key; render(); };
    el.appendChild(btn);
  });
}

/* ── 설명 ── */
function renderDesc(sc) {
  document.getElementById('sdesc-text').textContent = sc.desc;
}

/* ── SVG 상수 ── */
const PLUS_LG = `<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const PLUS_SM = `<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`;
const ARROW_RIGHT = `<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>`;

/* ── 포지션 컬럼 생성 ── */
function buildCol(slotKey, step, stepIndex, totalSteps) {
  const slot = SLOTS[slotKey];
  const col = document.createElement('div');
  col.className = 'st-col';

  /* 카드 */
  const card = document.createElement('div');
  card.className = 'st-card';

  // 집결장 영역
  const hero = document.createElement('div');
  hero.className = 'st-card-hero';

  // 순서 번호 — 카드 좌상단 (2개 이상일 때만)
  if (totalSteps > 1) {
    const num = document.createElement('div');
    num.className = `st-card-num ${slot.badgeClass}`;
    num.textContent = stepIndex + 1;
    hero.appendChild(num);
  }

  const repLabel = document.createElement('div');
  repLabel.className = 'st-rep-label';
  repLabel.textContent = '집결장';
  hero.appendChild(repLabel);

  if (slot.leader) {
    const av = document.createElement('div');
    av.className = 'st-rep-avatar';
    av.textContent = slot.leader.nickname.charAt(0);
    hero.appendChild(av);

    const nm = document.createElement('div');
    nm.className = 'st-rep-name';
    nm.textContent = slot.leader.nickname;
    hero.appendChild(nm);

    const tc = document.createElement('div');
    tc.className = 'st-rep-tc';
    tc.textContent = `TC ${slot.leader.city_level}`;
    hero.appendChild(tc);
  } else {
    const addBtn = document.createElement('button');
    addBtn.className = 'st-rep-add';
    addBtn.title = '집결장 등록';
    addBtn.innerHTML = PLUS_LG;
    addBtn.onclick = () => openDlg('leader', slotKey, step.role);
    hero.appendChild(addBtn);

    const hint = document.createElement('span');
    hint.className = 'st-rep-hint';
    hint.textContent = '집결장 등록';
    hero.appendChild(hint);
  }

  card.appendChild(hero);

  /* 집결원 목록 */
  const body = document.createElement('div');
  body.className = 'st-card-body';

  slot.members.forEach(m => {
    const row = document.createElement('div');
    row.className = 'st-member';

    const mav = document.createElement('div');
    mav.className = 'st-member-avatar';
    mav.textContent = m.nickname.charAt(0);
    row.appendChild(mav);

    const info = document.createElement('div');
    info.className = 'st-member-info';

    const name = document.createElement('span');
    name.className = 'st-member-name';
    name.textContent = m.nickname;
    info.appendChild(name);

    const tc = document.createElement('span');
    tc.className = 'st-member-tc';
    tc.textContent = `TC ${m.city_level}`;
    info.appendChild(tc);

    row.appendChild(info);
    body.appendChild(row);
  });

  // 집결원 등록 버튼 (항상 맨 아래)
  const addMbtn = document.createElement('button');
  addMbtn.className = 'st-member-add';
  addMbtn.onclick = () => openDlg('member', slotKey, step.role);
  addMbtn.innerHTML = `<span class="st-member-add-icon">${PLUS_SM}</span>집결원 등록`;
  body.appendChild(addMbtn);

  card.appendChild(body);
  col.appendChild(card);
  return col;
}

/* ── 화살표 커넥터 ── */
function buildArrow() {
  const col = document.createElement('div');
  col.className = 'flow-arrow-col';
  col.innerHTML = ARROW_RIGHT;
  return col;
}

/* ── 메인 렌더 ── */
function render() {
  renderTabs();
  const sc = SCENARIOS.find(s => s.key === activeKey);
  renderDesc(sc);

  const grid = document.getElementById('flow-grid');
  grid.innerHTML = '';

  const n = sc.steps.length;
  grid.className = 'flow-grid cols-' + n;

  if (n === 1) {
    grid.style.gridTemplateColumns = '';
  } else if (n === 2) {
    grid.style.gridTemplateColumns = sc.arrows ? '1fr 48px 1fr' : '1fr 1fr';
  } else {
    grid.style.gridTemplateColumns = sc.arrows ? '1fr 48px 1fr 48px 1fr' : '1fr 1fr 1fr';
  }

  sc.steps.forEach((step, i) => {
    grid.appendChild(buildCol(step.slotKey, step, i, n));
    if (sc.arrows && i < n - 1) grid.appendChild(buildArrow());
  });
}

/* ──────────────────────────────────────
   다이얼로그
────────────────────────────────────── */
function openDlg(mode, slotKey, role) {
  dlgMode = mode;
  dlgSlotKey = slotKey;
  dlgRole = role;
  document.getElementById('dlg-title').textContent =
    (mode === 'leader' ? '집결장 등록' : '집결원 등록') + ' — ' + role;
  document.getElementById('dlg-id-input').value = '';
  document.getElementById('dlg-preview').setAttribute('hidden', '');
  document.getElementById('dlg-confirm-btn').setAttribute('hidden', '');
  document.getElementById('dlg-backdrop').removeAttribute('hidden');
  setTimeout(() => document.getElementById('dlg-id-input').focus(), 60);
}
function closeDlg() { document.getElementById('dlg-backdrop').setAttribute('hidden', ''); }
function onDlgInput() {
  const v = document.getElementById('dlg-id-input').value.replace(/\D/g,'').slice(0,15);
  document.getElementById('dlg-id-input').value = v;
  document.getElementById('dlg-preview').setAttribute('hidden','');
  document.getElementById('dlg-confirm-btn').setAttribute('hidden','');
}

// 더미 플레이어 (시안 테스트용 — 실제는 EF 호출)
const DUMMY = {
  '12345': { nickname:'서울워리어',  city_level:27 },
  '99999': { nickname:'빛의수호자',  city_level:28 },
  '11111': { nickname:'어둠의검사', city_level:26 },
};
function doSearch() {
  const id = document.getElementById('dlg-id-input').value.trim();
  if (!/^\d{4,15}$/.test(id)) { alert('4~15자리 숫자로 입력해 주세요.'); return; }
  const p = DUMMY[id] ?? { nickname:`플레이어_${id.slice(-4)}`, city_level:26 };
  document.getElementById('dlg-prev-avatar').textContent = p.nickname.charAt(0);
  document.getElementById('dlg-prev-name').textContent = p.nickname;
  document.getElementById('dlg-prev-meta').textContent = `#${id} · TC ${p.city_level}`;
  document.getElementById('dlg-preview').removeAttribute('hidden');
  document.getElementById('dlg-confirm-btn').removeAttribute('hidden');
}
function doConfirm() {
  const name = document.getElementById('dlg-prev-name').textContent;
  const tc   = parseInt(document.getElementById('dlg-prev-meta').textContent.match(/TC (\d+)/)?.[1] ?? '26');

  // 시안 — 실제 등록처럼 슬롯 데이터를 직접 업데이트하여 동적 변경 확인
  if (dlgMode === 'leader') {
    SLOTS[dlgSlotKey].leader = { nickname: name, city_level: tc, avatar_url: null };
  } else {
    SLOTS[dlgSlotKey].members.push({ nickname: name, city_level: tc });
  }
  closeDlg();
  render(); // 탭 흐름 미리보기 포함 전체 재렌더
}

document.getElementById('dlg-backdrop').addEventListener('click', function(e) { if(e.target===this) closeDlg(); });
document.addEventListener('keydown', e => { if(e.key==='Escape') closeDlg(); });

render();

/* ══════════════════════════════════════
   채팅 — 5분 레이트 리밋
══════════════════════════════════════ */
const CHAT_COOLDOWN_MS = 5 * 60 * 1000; // 5분
const CHAT_KEY = 'chat_last_send';

// 시안용 현재 로그인 사용자 (실제는 pnx-sk-auth-v1 localStorage 참조)
const ME = { kingshot_id: '10001', nickname: '폭풍전사', avatar_url: null };
// null 로 바꾸면 미로그인 상태 시연
// const ME = null;

// 더미 메시지 초기 데이터
const chatMessages = [
  { id: 1, user: { nickname: '블루드래곤', avatar_url: null }, text: '오늘 공격 시작 몇 시예요?', ts: Date.now() - 18 * 60000 },
  { id: 2, user: { nickname: '번개기사',   avatar_url: null }, text: '오후 9시로 알고있어요', ts: Date.now() - 15 * 60000 },
  { id: 3, user: { nickname: '블루드래곤', avatar_url: null }, text: '알겠습니다 준비할게요', ts: Date.now() - 14 * 60000 },
  { id: 4, user: { nickname: '서리기사',   avatar_url: null }, text: '집결장 위치 공유해주실 수 있나요?', ts: Date.now() - 8 * 60000 },
  { id: 5, user: { nickname: '폭풍전사',   avatar_url: null }, text: '전략 페이지 참고하세요! 카드에 다 나와있어요', ts: Date.now() - 6 * 60000 },
];
let chatIdCounter = chatMessages.length + 1;
let cooldownTimer = null;

function fmtTime(ts) {
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function buildMsgEl(msg, isMe) {
  const row = document.createElement('div');
  row.className = 'chat-msg' + (isMe ? ' is-mine' : '');

  const av = document.createElement('div');
  av.className = 'chat-msg-avatar';
  av.textContent = msg.user.nickname.charAt(0);
  row.appendChild(av);

  const body = document.createElement('div');
  body.className = 'chat-msg-body';

  const meta = document.createElement('div');
  meta.className = 'chat-msg-meta';
  const nick = document.createElement('span');
  nick.className = 'chat-msg-nick';
  nick.textContent = msg.user.nickname;
  const time = document.createElement('span');
  time.textContent = fmtTime(msg.ts);
  meta.appendChild(nick);
  meta.appendChild(time);
  body.appendChild(meta);

  const bubble = document.createElement('div');
  bubble.className = 'chat-msg-bubble';
  bubble.textContent = msg.text;
  body.appendChild(bubble);

  row.appendChild(body);
  return row;
}

function renderChatMessages() {
  const el = document.getElementById('chat-messages');
  if (!el) return;
  el.innerHTML = '';

  let lastDate = null;
  chatMessages.forEach(msg => {
    const d = new Date(msg.ts);
    const dateStr = `${d.getMonth()+1}월 ${d.getDate()}일`;
    if (dateStr !== lastDate) {
      const div = document.createElement('div');
      div.className = 'chat-date-divider';
      div.textContent = dateStr;
      el.appendChild(div);
      lastDate = dateStr;
    }
    const isMe = ME && msg.user.nickname === ME.nickname;
    el.appendChild(buildMsgEl(msg, isMe));
  });
  el.scrollTop = el.scrollHeight;
}

function getCooldownRemaining() {
  const last = parseInt(localStorage.getItem(CHAT_KEY) || '0');
  return Math.max(0, CHAT_COOLDOWN_MS - (Date.now() - last));
}

function fmtCountdown(ms) {
  const s = Math.ceil(ms / 1000);
  const m = Math.floor(s / 60), sec = s % 60;
  return `${m}분 ${sec.toString().padStart(2,'0')}초 후 전송 가능`;
}

function renderChatInput() {
  const area = document.getElementById('chat-input-area');
  if (!area) return;

  if (!ME) {
    area.innerHTML = `<div class="chat-login-notice">채팅에 참여하려면 <a onclick="document.dispatchEvent(new CustomEvent('app-open-auth'))">로그인</a>이 필요합니다.</div>`;
    return;
  }

  const remaining = getCooldownRemaining();
  const isCooling = remaining > 0;

  area.innerHTML = `
    <div class="chat-input-area">
      <div class="chat-input-row">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="메시지를 입력하세요…"
          ${isCooling ? 'disabled' : ''}
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMessage()}"
        ></textarea>
        <button class="chat-send-btn" id="chat-send-btn"
          onclick="sendChatMessage()" ${isCooling ? 'disabled' : ''}>전송</button>
      </div>
      <div class="chat-cooldown" id="chat-cooldown">${isCooling ? fmtCountdown(remaining) : ''}</div>
    </div>`;

  if (isCooling) startCooldownTick();
  else if (!isCooling) document.getElementById('chat-input')?.focus();
}

function startCooldownTick() {
  clearInterval(cooldownTimer);
  cooldownTimer = setInterval(() => {
    const r = getCooldownRemaining();
    const cdEl = document.getElementById('chat-cooldown');
    const inputEl = document.getElementById('chat-input');
    const btnEl = document.getElementById('chat-send-btn');
    if (r <= 0) {
      clearInterval(cooldownTimer);
      if (cdEl) cdEl.textContent = '';
      if (inputEl) { inputEl.disabled = false; inputEl.focus(); }
      if (btnEl) btnEl.disabled = false;
    } else {
      if (cdEl) cdEl.textContent = fmtCountdown(r);
    }
  }, 1000);
}

function sendChatMessage() {
  if (!ME) return;
  if (getCooldownRemaining() > 0) return;
  const input = document.getElementById('chat-input');
  if (!input) return;
  const text = input.value.trim();
  if (!text) return;

  // 메시지 추가
  chatMessages.push({ id: chatIdCounter++, user: ME, text, ts: Date.now() });
  localStorage.setItem(CHAT_KEY, Date.now().toString());

  renderChatMessages();
  renderChatInput();
  startCooldownTick();
}

// 초기 렌더
renderChatMessages();
renderChatInput();
document.getElementById('chat-online-count').textContent = '접속자 12명';
</script>
</body>
</html>
